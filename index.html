<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>姥姥的树</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f0f7f0;
            min-height: 100vh;
            color: #2e4a2e;
            overflow-x: hidden;
        }
        
        /* 顶部导航 */
        .top-nav {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
            padding: 12px 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .top-nav h1 { font-size: 16px; }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* 悬浮目录按钮 */
        .fab {
            position: fixed;
            top: 7px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 101;
            border: 2px solid #81c784;
        }
        .fab svg { width: 20px; height: 20px; fill: #43a047; }
        
        /* 侧边栏 */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 199;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        .sidebar {
            position: fixed;
            top: 0; right: -50%;
            width: 50%;
            height: 100%;
            background: #fff;
            z-index: 200;
            transition: right 0.3s;
            overflow-y: auto;
            padding: 16px 12px;
        }
        .sidebar.active { right: 0; }
        .sidebar-close { position: absolute; top: 12px; right: 12px; cursor: pointer; color: #999; font-size: 20px; }
        .sidebar-header { font-size: 16px; font-weight: 700; color: #2e7d32; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e8f5e9; }
        .nav-item { margin-bottom: 12px; }
        .nav-title { font-size: 14px; font-weight: 600; color: #1b5e20; cursor: pointer; padding: 6px 4px; }
        .nav-title:active { background: #e8f5e9; }
        .nav-title .pages { font-size: 11px; color: #81c784; background: #f1f8e9; padding: 2px 6px; border-radius: 10px; }
        .nav-pages { padding-left: 8px; display: flex; gap: 6px; }
        .nav-page-link { font-size: 12px; color: #558b2f; text-decoration: none; padding: 4px 10px; background: #f1f8e9; border-radius: 12px; cursor: pointer; }
        
        /* 首页 */
        .home-view {
            padding: 66px 16px 20px;
            display: block;
        }
        .home-view.hidden { display: none; }
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .catalog-item {
            background: #fff;
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid #e8f5e9;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }
        .catalog-icon { font-size: 20px; margin-bottom: 4px; }
        .catalog-title { font-size: 13px; font-weight: 600; color: #2e4a2e; }
        .catalog-pages { font-size: 10px; color: #81c784; margin-top: 2px; }
        
        /* 内容容器 */
        .content-wrapper {
            display: none;
            padding-top: 50px;
            padding-bottom: 50px;
            min-height: 100vh;
        }
        .content-wrapper.active { display: block; }
        
        /* iframe 样式 */
        .content-frame {
            width: 100%;
            min-height: calc(100vh - 100px);
            border: none;
            display: block;
        }
        
        /* 底部分页 */
        .pagination {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #e8f5e9;
            padding: 10px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            z-index: 50;
            height: 50px;
        }
        .pagination a, .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
        }
        .pagination a { color: #43a047; background: #f1f8e9; border: 1px solid #c8e6c9; cursor: pointer; }
        .pagination a:active { background: #43a047; color: white; }
        .pagination .current { background: #43a047; color: white; font-weight: 600; }
        .pagination .arrow { font-size: 14px; padding: 0 12px; }
        .pagination .disabled { color: #ccc; background: #f5f5f5; }
        .page-info { font-size: 14px; color: #666; font-weight: 600; }
        
        /* 到底提示 - 增强样式 */
        .bottom-hint {
            text-align: center;
            padding: 20px 16px 30px;
            color: #81c784;
            font-size: 13px;
            display: none;
            clear: both;
        }
        .bottom-hint.show { 
            display: block; 
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 首页底部提示 */
        .home-bottom-hint {
            text-align: center;
            padding: 20px 16px 30px;
            color: #81c784;
            font-size: 13px;
            display: none;
        }
        .home-bottom-hint.show { display: block; }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-nav" id="topNav">
        <span class="back-btn" onclick="goHome()" id="backBtn" style="visibility: hidden;">← 首页</span>
        <h1>🌿 姥姥的树</h1>
        <span style="width:40px;"></span>
    </header>

    <!-- 悬浮目录 -->
    <div class="fab" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-close" onclick="toggleSidebar()">✕</div>
        <div class="sidebar-header">🌲 姥姥的树存档</div>
        <div id="sidebarContent"></div>
    </nav>

    <!-- 首页 -->
    <main class="home-view" id="homeView">
        <div style="text-align:center; margin-bottom:16px; color:#558b2f; font-size:13px;">🌱 欢迎来到姥姥的树</div>
        <div class="catalog-grid" id="catalogGrid"></div>
        <div class="home-bottom-hint" id="homeBottomHint">— 已经到底了 —</div>
    </main>

    <!-- 内容容器 -->
    <div class="content-wrapper" id="contentWrapper">
        <iframe class="content-frame" id="contentFrame" scrolling="yes"></iframe>
        <div class="bottom-hint" id="contentBottomHint">— 已经到底了 —</div>
    </div>

    <!-- 底部分页 -->
    <nav class="pagination" id="pagination" style="display: none;"></nav>

    <script>
        const archiveData = {
            "史官楼": { pages: 2, icon: "📜" },
            "吵架1": { pages: 3, icon: "💢" },
            "吵架2": { pages: 3, icon: "😤" },
            "吵架3": { pages: 1, icon: "😠" },
            "吵架4": { pages: 1, icon: "🤬" },
            "姥组吵架整理": { pages: 1, icon: "📝" },
            "苹果凌晨出没": { pages: 1, icon: "🍎" },
            "建议楼": { pages: 1, icon: "💡" },
            "组务投票楼": { pages: 1, icon: "🗳️" },
            "管理员留任投票楼": { pages: 1, icon: "🗳️" },
            "投票2号": { pages: 1, icon: "🗳️" },
            "管理组群内": { pages: 1, icon: "👥" },
            "三天后狐狸第一次现身组内": { pages: 1, icon: "🦊" },
            "组员发帖1": { pages: 2, icon: "📮" },
            "苹果现身组内": { pages: 2, icon: "🍎" }
        };

        let currentSeries = null;
        let currentPage = 1;

        function init() {
            renderHome();
            renderSidebar();
            setupScrollListener();
        }

        function renderHome() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = Object.keys(archiveData).map(key => {
                const item = archiveData[key];
                return `<div class="catalog-item" onclick="loadContent('${key}', 1)">
                    <div class="catalog-icon">${item.icon}</div>
                    <div class="catalog-title">${key}</div>
                    <div class="catalog-pages">[${item.pages}页]</div>
                </div>`;
            }).join('');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebarContent');
            container.innerHTML = Object.keys(archiveData).map(key => {
                const item = archiveData[key];
                const pages = Array.from({length: item.pages}, (_, i) => 
                    `<span class="nav-page-link" onclick="loadContent('${key}', ${i+1}); toggleSidebar();">${i+1}</span>`
                ).join('');
                return `<div class="nav-item">
                    <div class="nav-title" onclick="loadContent('${key}', 1); toggleSidebar();">
                        ${key} <span class="pages">[${item.pages}页]</span>
                    </div>
                    <div class="nav-pages">${pages}</div>
                </div>`;
            }).join('');
        }

        function loadContent(series, page) {
            currentSeries = series;
            currentPage = page;
            const data = archiveData[series];
            
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('contentWrapper').classList.add('active');
            document.getElementById('pagination').style.display = 'flex';
            document.getElementById('backBtn').style.visibility = 'visible';
            
            const path = series + '/' + page + '.html';
            document.getElementById('contentFrame').src = path;
            
            renderPagination(series, page, data.pages);
            
            // 重置到底提示
            document.getElementById('contentBottomHint').classList.remove('show');
        }

        function renderPagination(series, current, total) {
            const nav = document.getElementById('pagination');
            let html = '';
            
            if (current > 1) {
                html += `<a onclick="loadContent('${series}', ${current-1})" class="arrow">← 上一页</a>`;
            } else {
                html += `<span class="arrow disabled">← 上一页</span>`;
            }
            
            html += `<span class="page-info">第 ${current} / ${total} 页</span>`;
            
            if (current < total) {
                html += `<a onclick="loadContent('${series}', ${current+1})" class="arrow">下一页 →</a>`;
            } else {
                html += `<span class="arrow disabled">下一页 →</span>`;
            }
            
            nav.innerHTML = html;
        }

        function goHome() {
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('contentWrapper').classList.remove('active');
            document.getElementById('pagination').style.display = 'none';
            document.getElementById('backBtn').style.visibility = 'hidden';
            document.getElementById('contentFrame').src = '';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        // 滚动检测 - 改进版
        function setupScrollListener() {
            let ticking = false;
            
            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        checkScrollBottom();
                        ticking = false;
                    });
                    ticking = true;
                }
            });
            
            // 也监听 iframe 的加载完成
            document.getElementById('contentFrame').addEventListener('load', function() {
                // iframe 加载后检查高度
                setTimeout(checkScrollBottom, 100);
            });
        }

        function checkScrollBottom() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight;
            const clientHeight = document.documentElement.clientHeight;
            
            // 增加容错阈值，确保能触发
            const threshold = 50;
            const isBottom = scrollTop + clientHeight >= scrollHeight - threshold;
            
            // 首页提示
            const homeHint = document.getElementById('homeBottomHint');
            if (!document.getElementById('homeView').classList.contains('hidden')) {
                if (isBottom) homeHint.classList.add('show');
                else homeHint.classList.remove('show');
            }
            
            // 内容页提示
            const contentHint = document.getElementById('contentBottomHint');
            if (document.getElementById('contentWrapper').classList.contains('active')) {
                if (isBottom) contentHint.classList.add('show');
                else contentHint.classList.remove('show');
            }
        }

        // 定时检查（备用方案）
        setInterval(checkScrollBottom, 500);

        init();
    </script>
</body>
</html>
