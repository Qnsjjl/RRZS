<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姥姥的树存档</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f6f8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .folder-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .folder-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .folder-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            margin-bottom: 8px;
        }
        .file-link {
            display: block;
            padding: 10px 15px;
            background-color: #f8f9fa;
            text-decoration: none;
            color: #495057;
            border-radius: 4px;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .file-link:hover {
            background-color: #e9ecef;
            border-left: 4px solid #007bff;
            color: #007bff;
            transform: translateX(5px);
        }
        /* 简单的加载提示 */
        .loading-text {
            color: #999;
            font-size: 0.9em;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <h1>🌳 姥姥的树存档</h1>

    <!-- 容器：所有的文件夹列表会生成在这里 -->
    <div id="archive-container"></div>

    <script>
        // 这里定义了你要求的顺序和对应的文件夹名称
        // 注意：如果你的文件夹名字有空格或特殊符号，请保持和GitHub上一模一样
        const folders = [
            "史官楼",
            "吵架1",
            "吵架2",
            "吵架3",
            "吵架4",
            "苹果凌晨出没",
            "建议楼",
            "组务投票楼",
            "管理员留任投票楼",
            "投票2号",
            "管理组群内",
            "三天后狐狸第一次现身组内",
            "组员发帖",
            "苹果现身组内"
        ];

        const container = document.getElementById('archive-container');

        // 遍历每一个文件夹
        folders.forEach(folderName => {
            // 创建文件夹的大盒子
            const section = document.createElement('div');
            section.className = 'folder-section';

            // 创建标题
            const title = document.createElement('div');
            title.className = 'folder-title';
            title.innerHTML = `<span class="folder-icon">📂</span> ${folderName}`;
            section.appendChild(title);

            // 创建列表容器
            const ul = document.createElement('ul');
            ul.className = 'file-list';

            // 核心逻辑：尝试寻找 1.html 到 20.html
            // 这样可以解决有的文件夹有3个，有的只有1个的问题
            let foundAny = false; // 标记是否找到了文件

            for (let i = 1; i <= 20; i++) {
                // 构造路径，例如：吵架1/1.html
                const filePath = `${folderName}/${i}.html`;

                // 创建一个临时的图片标签来测试文件是否存在
                // 这是纯前端判断文件是否存在的最简单方法（HEAD请求）
                const img = new Image();
                img.onload = function() {
                    // 如果加载成功（说明文件存在），则添加链接
                    addLink(ul, filePath, i);
                    foundAny = true;
                };
                // 这里的 src 指向 html 文件，虽然它是网页，但浏览器能读取到它的大小从而触发 onload
                // 加上时间戳防止缓存导致判断失误
                img.src = filePath + '?t=' + new Date().getTime();
            }

            // 如果循环结束还没找到任何文件（或者网络慢还没加载完），
            // 我们至少放一个默认的 1.html 链接保底，防止文件夹看起来是空的
            // (如果你确定所有文件夹都有1.html，这行可以保留作为保险)
            setTimeout(() => {
                if (ul.children.length === 0) {
                   const fallbackLi = document.createElement('li');
                   fallbackLi.className = 'file-item';
                   fallbackLi.innerHTML = `<a href=" " class="file-link">查看第 1 页 (默认)</a >`;
                   ul.appendChild(fallbackLi);
                }
            }, 2000); // 2秒后如果没检测到，就显示默认链接

            section.appendChild(ul);
            container.appendChild(section);
        });

        // 辅助函数：添加链接到列表
        function addLink(parentUl, path, index) {
            // 避免重复添加（因为异步加载可能会乱序）
            // 检查一下是不是已经加过这个 index 了
            const existingLinks = parentUl.querySelectorAll('a');
            for(let link of existingLinks) {
                if(link.getAttribute('href') === path) return;
            }

            const li = document.createElement('li');
            li.className = 'file-item';

            const a = document.createElement('a');
            a.href = path;
            a.className = 'file-link';
            a.textContent = `第 ${index} 页`; // 显示文字：第 1 页, 第 2 页...

            li.appendChild(a);
            parentUl.appendChild(li);

            // 排序：为了让链接按 1, 2, 3 顺序排列，而不是谁先加载出来谁在前面
            sortList(parentUl);
        }

        // 辅助函数：给列表排序
        function sortList(ul) {
            const items = Array.from(ul.querySelectorAll('li'));
            items.sort((a, b) => {
                const textA = a.querySelector('a').textContent;
                const textB = b.querySelector('a').textContent;
                // 提取数字进行比较
                const numA = parseInt(textA.replace(/\D/g, ''));
                const numB = parseInt(textB.replace(/\D/g, ''));
                return numA - numB;
            });

            // 清空并重新添加
            ul.innerHTML = '';
            items.forEach(item => ul.appendChild(item));
        }
    </script>
</body>
</html>
