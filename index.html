<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>姥姥的树</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f0f7f0 0%, #e8f5e9 100%);
            min-height: 100vh;
            color: #2e4a2e;
            overflow-x: hidden;
        }
        .header {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
            padding: 12px 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 悬浮目录按钮 */
        .fab {
            position: fixed;
            top: 7px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 101;
            border: 2px solid #81c784;
        }
        .fab:active { transform: scale(0.95); }
        .fab svg { width: 20px; height: 20px; fill: #43a047; }
        
        /* 侧边栏 */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 199;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        .sidebar {
            position: fixed;
            top: 0; right: -50%;
            width: 50%;
            height: 100%;
            background: #fff;
            z-index: 200;
            transition: right 0.3s ease-out;
            overflow-y: auto;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            padding: 16px 12px;
        }
        .sidebar.active { right: 0; }
        .sidebar-close {
            position: absolute;
            top: 12px; right: 12px;
            cursor: pointer;
            color: #999;
            font-size: 20px;
        }
        .sidebar-header {
            font-size: 16px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8f5e9;
        }
        .nav-item { margin-bottom: 12px; }
        .nav-title {
            font-size: 14px;
            font-weight: 600;
            color: #1b5e20;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            padding: 6px 4px;
            border-radius: 6px;
        }
        .nav-title:active { background: #e8f5e9; }
        .nav-title .pages {
            font-size: 11px;
            color: #81c784;
            background: #f1f8e9;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .nav-pages {
            padding-left: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .nav-page-link {
            font-size: 12px;
            color: #558b2f;
            text-decoration: none;
            padding: 4px 10px;
            background: #f1f8e9;
            border-radius: 12px;
            border: 1px solid #c8e6c9;
            cursor: pointer;
        }
        
        /* 首页 */
        .home-view {
            padding: 66px 16px 20px;
            display: block;
        }
        .home-view.hidden { display: none; }
        .welcome {
            text-align: center;
            margin-bottom: 16px;
            color: #558b2f;
            font-size: 13px;
        }
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .catalog-item {
            background: #fff;
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid #e8f5e9;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }
        .catalog-item:active { background: #f1f8e9; }
        .catalog-icon { font-size: 20px; margin-bottom: 4px; }
        .catalog-title { font-size: 13px; font-weight: 600; color: #2e4a2e; }
        .catalog-pages { font-size: 10px; color: #81c784; margin-top: 2px; }
        
        /* 内容页 */
        .content-view {
            padding: 66px 16px 80px;
            display: none;
        }
        .content-view.active { display: block; }
        .content-title {
            font-size: 18px;
            color: #1b5e20;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8f5e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content-body {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: 300px;
        }
        
        /* 底部分页 */
        .pagination {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #e8f5e9;
            padding: 10px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            z-index: 50;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
        }
        .pagination a, .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .pagination a {
            color: #43a047;
            background: #f1f8e9;
            border: 1px solid #c8e6c9;
        }
        .pagination a:active { background: #43a047; color: white; }
        .pagination .current { background: #43a047; color: white; font-weight: 600; }
        .pagination .arrow { font-size: 14px; padding: 0 12px; font-weight: 600; }
        .pagination .disabled { color: #ccc; background: #f5f5f5; border: 1px solid #e0e0e0; }
        .page-info { font-size: 14px; color: #666; font-weight: 600; margin: 0 8px; }
        
        .bottom-hint {
            text-align: center;
            padding: 16px;
            color: #81c784;
            font-size: 12px;
            display: none;
        }
        .bottom-hint.show { display: block; }
        
        .footer {
            text-align: center;
            padding: 20px 0;
            color: #a5d6a7;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <header class="header">
        <span class="back-btn" onclick="goHome()" id="backBtn" style="visibility: hidden;">← 首页</span>
        <h1>🌿 姥姥的树</h1>
        <span style="width:40px;"></span>
    </header>

    <!-- 悬浮目录 -->
    <div class="fab" onclick="toggleSidebar()" aria-label="目录">
        <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
    </div>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-close" onclick="toggleSidebar()">✕</div>
        <div class="sidebar-header">🌲 姥姥的树存档</div>
        <div id="sidebarContent"></div>
    </nav>

    <!-- 首页 -->
    <main class="home-view" id="homeView">
        <div class="welcome">🌱 欢迎来到姥姥的树，点击标题即可阅读</div>
        <div class="catalog-grid" id="catalogGrid"></div>
        <div class="footer">
            <p>🌳 姥姥的树 · 存档站</p>
        </div>
        <div class="bottom-hint" id="homeBottomHint">— 已经到底了 —</div>
    </main>

    <!-- 内容页 -->
    <main class="content-view" id="contentView">
        <div class="content-title">
            <span id="contentTitle">标题</span>
            <span style="font-size:13px; color:#81c784;" id="pageNum">第 1 / 1 页</span>
        </div>
        <div class="content-body" id="contentBody"></div>
        <div class="bottom-hint" id="contentBottomHint">— 已经到底了 —</div>
        <nav class="pagination" id="pagination"></nav>
    </main>

    <script>
        // 数据配置 - 只改这里！
        const archiveData = {
            "史官楼": { pages: 2, icon: "📜" },
            "吵架1": { pages: 3, icon: "💢" },
            "吵架2": { pages: 3, icon: "😤" },
            "吵架3": { pages: 1, icon: "😠" },
            "吵架4": { pages: 1, icon: "🤬" },
            "姥组吵架整理": { pages: 1, icon: "📝" },
            "苹果凌晨出没": { pages: 1, icon: "🍎" },
            "建议楼": { pages: 1, icon: "💡" },
            "组务投票楼": { pages: 1, icon: "🗳️" },
            "管理员留任投票楼": { pages: 1, icon: "🗳️" },
            "投票2号": { pages: 1, icon: "🗳️" },
            "管理组群内": { pages: 1, icon: "👥" },
            "三天后狐狸第一次现身组内": { pages: 1, icon: "🦊" },
            "组员发帖1": { pages: 2, icon: "📮" },
            "苹果现身组内": { pages: 2, icon: "🍎" }
        };

        // 初始化
        function init() {
            renderHome();
            renderSidebar();
            
            // 检查URL
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const parts = hash.split('_');
                if (parts.length === 2) {
                    loadContent(parts[0], parseInt(parts[1]));
                }
            }
            
            window.addEventListener('hashchange', function() {
                const hash = window.location.hash.replace('#', '');
                if (hash) {
                    const parts = hash.split('_');
                    loadContent(parts[0], parseInt(parts[1]));
                } else {
                    goHome();
                }
            });
            
            window.addEventListener('scroll', function() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight;
                const clientHeight = document.documentElement.clientHeight;
                const hint = document.getElementById('homeView').classList.contains('hidden') ? 
                    document.getElementById('contentBottomHint') : document.getElementById('homeBottomHint');
                if (scrollTop + clientHeight >= scrollHeight - 10) {
                    hint.classList.add('show');
                } else {
                    hint.classList.remove('show');
                }
            });
        }

        // 渲染首页
        function renderHome() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = Object.keys(archiveData).map(key => {
                const item = archiveData[key];
                return `
                    <div class="catalog-item" onclick="loadContent('${key}', 1)">
                        <div class="catalog-icon">${item.icon}</div>
                        <div class="catalog-title">${key}</div>
                        <div class="catalog-pages">[${item.pages}页]</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染侧边栏
        function renderSidebar() {
            const container = document.getElementById('sidebarContent');
            container.innerHTML = Object.keys(archiveData).map(key => {
                const item = archiveData[key];
                const pages = Array.from({length: item.pages}, (_, i) => 
                    `<span class="nav-page-link" onclick="loadContent('${key}', ${i+1}); toggleSidebar();">${i+1}</span>`
                ).join('');
                
                return `
                    <div class="nav-item">
                        <div class="nav-title" onclick="loadContent('${key}', 1); toggleSidebar();">
                            ${key} <span class="pages">[${item.pages}页]</span>
                        </div>
                        <div class="nav-pages">${pages}</div>
                    </div>
                `;
            }).join('');
        }

        // 加载内容 - 从外部文件获取
        function loadContent(series, page) {
            const data = archiveData[series];
            if (!data) return;
            
            window.location.hash = series + '_' + page;
            
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('contentView').classList.add('active');
            document.getElementById('backBtn').style.visibility = 'visible';
            
            document.getElementById('contentTitle').textContent = series;
            document.getElementById('pageNum').textContent = `第 ${page} / ${data.pages} 页`;
            
            // 从外部文件加载内容
            fetch(series + '/' + page + '.html')
                .then(r => {
                    if (!r.ok) throw new Error('未找到');
                    return r.text();
                })
                .then(text => {
                    document.getElementById('contentBody').innerHTML = text;
                })
                .catch(() => {
                    document.getElementById('contentBody').innerHTML = '<p style="color:#999; text-align:center; padding:40px;">内容加载失败</p>';
                });
            
            // 渲染分页
            renderPagination(series, page, data.pages);
            window.scrollTo(0, 0);
        }

        // 渲染分页
        function renderPagination(series, current, total) {
            const nav = document.getElementById('pagination');
            let html = '';
            
            if (current > 1) {
                html += `<a onclick="loadContent('${series}', ${current-1})" class="arrow">← 上一页</a>`;
            } else {
                html += `<span class="arrow disabled">← 上一页</span>`;
            }
            
            html += `<span class="page-info">第 ${current} / ${total} 页</span>`;
            
            if (current < total) {
                html += `<a onclick="loadContent('${series}', ${current+1})" class="arrow">下一页 →</a>`;
            } else {
                html += `<span class="arrow disabled">下一页 →</span>`;
            }
            
            nav.innerHTML = html;
        }

        // 返回首页
        function goHome() {
            window.location.hash = '';
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('contentView').classList.remove('active');
            document.getElementById('backBtn').style.visibility = 'hidden';
            window.scrollTo(0, 0);
        }

        // 侧边栏切换
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        init();
    </script>
</body>
</html>
